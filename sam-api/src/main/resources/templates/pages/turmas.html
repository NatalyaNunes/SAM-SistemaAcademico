<div th:replace="~{layout :: modelo('Turmas', 'turmas', 'ALUNO', ~{::section})}">
    <section>
        <header class="my-5">
            <h1 class="fw-bold h3 mb-1">Explorar Oferta Acadêmica</h1>
            <p class="text-muted">Encontre disciplinas e simule sua grade ideal para o próximo semestre.</p>
        </header>

        <div class="filter-section mb-5 shadow-sm">
            <div class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-bold text-muted">Pesquisar Disciplina</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0"><i
                                class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control border-start-0"
                            placeholder="Nome ou código (ex: DIM0510)">
                    </div>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Turno</label>
                    <select class="form-select">
                        <option selected>Todos os turnos</option>
                        <option>Manhã</option>
                        <option>Tarde</option>
                        <option>Noite</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Professor</label>
                    <input type="text" class="form-control" placeholder="Filtrar por docente...">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-primary w-100 fw-bold py-2 shadow-sm">Filtrar</button>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div th:each="turma : ${todasAsTurmas}" class="col-md-4">
                <div th:replace="~{fragment/cardTurma :: cardTurma(turma=${turma})}"></div>
            </div>
            <div th:if="${#lists.isEmpty(todasAsTurmas)}" class="text-muted text-center py-5">
                Nenhuma turma disponível na oferta deste semestre.
            </div>
        </div>

        <div class="row g-4">
            <div th:each="turma : ${todasAsTurmas}" class="col-md-4">
                <div th:replace="~{fragment/cardTurma :: cardTurma(turma=${turma})}"></div>
            </div>
        </div>

        <script>
            // Essa função deve ser chamada no 'onclick' do botão dentro do seu 'fragment/cardTurma.html'
            // Exemplo no fragmento: <button th:onclick="'selecionarTurma(\'' + ${turma.codigo} + '\')'">Selecionar</button>

            function selecionarTurma(codigoTurma) {
                // Pegue a matrícula do aluno logado (aqui está chumbada conforme seu layout, adapte se necessário)
                const matriculaAluno = "20240023849";

                // 1. Consulta a API para simular o choque de horário ANTES de salvar
                fetch(`/api/interesses/aluno/${matriculaAluno}/simular-conflito/${codigoTurma}`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.conflito) {
                            // 2. ALERTA VISUAL IMEDIATO: Mostra o erro e interrompe
                            alert("⚠️ ATENÇÃO: Esta disciplina possui choque de horário com outra que você já selecionou! A nota será impossível de cumprir.");
                            // Obs: Se você usar SweetAlert2 no projeto, troque o alert() por Swal.fire('Oops...', 'Choque de horário!', 'error');
                        } else {
                            // 3. Se não tiver conflito, prossegue para cadastrar o interesse
                            cadastrarInteresse(matriculaAluno, codigoTurma);
                        }
                    })
                    .catch(error => console.error('Erro ao verificar conflito:', error));
            }

            // Função auxiliar para de fato realizar a seleção após passar pela validação
            function cadastrarInteresse(matricula, codigoTurma) {
                fetch(`/api/interesses/${matricula}/${codigoTurma}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                }).then(response => {
                    if (response.ok) {
                        alert("✅ Turma adicionada com sucesso à sua grade!");
                        window.location.reload(); // Recarrega para atualizar o botão/lista
                    } else {
                        alert("❌ Erro ao adicionar turma. Você já pode estar matriculado.");
                    }
                });
            }
        </script>
    </section>
</div>
