<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="modelo(titulo, menuAtivo, role, conteudo)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | SAM'">SAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" type="text/css" th:href="@{/css/main.css}" />
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{fragment/sidebar :: sidebar(${menuAtivo}, ${role})}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-4 main-content">
                <div th:replace="${conteudo}"></div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
