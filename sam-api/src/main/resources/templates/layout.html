<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="modelo(titulo, menuAtivo, role, conteudo)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' | SAM'">SAM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" type="text/css" th:href="@{/css/main.css}" />
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{fragment/sidebar :: sidebar(${menuAtivo}, ${role})}"></div>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-4 main-content">
                <div th:replace="${conteudo}"></div>
            </main>
        </div>
    </div>
    <div class="modal fade" id="logoutModal" tabindex="-1" aria-labelledby="logoutModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
            <div class="modal-content card border-0">

                <div class="modal-header border-0 pb-0 pt-4 px-4">
                    <h5 class="modal-title w-100 text-center fw-bold" style="color: var(--text-main);"
                        id="logoutModalLabel">
                        Encerrar Sessão
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>

                <div class="modal-body text-center p-4">
                    <p class="mb-0" style="color: var(--text-muted);">
                        Tem certeza que deseja sair do sistema?
                    </p>
                </div>

                <div class="modal-footer border-0 d-flex justify-content-center gap-3 pb-4">
                    <button type="button" class="btn btn-outline-custom" data-bs-dismiss="modal">Cancelar</button>

                    <a th:href="@{/logout}" class="btn btn-primary-custom py-2 px-4"
                        style="background-color: #dc3545; border-color: #dc3545;">
                        Sair
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
