<div th:fragment="cardTurma(turma)" class="card h-100 shadow-sm border-0 class-card">
    <div class="card-body p-4 d-flex flex-column justify-content-between">
        <div>
            <div class="d-flex justify-content-between align-items-start mb-3">
                <span class="badge bg-light text-primary fw-bold" th:text="${turma.disciplina.codigo}">DIM0510</span>
                <span class="text-muted small" th:text="'Turma ' + ${turma.codigo}">Turma 01</span>
            </div>
            
            <h5 class="card-title fw-bold mb-2 h6" th:text="${turma.disciplina.nome}">Estrutura de Dados I</h5>
            <p class="card-text text-muted small mb-3">
                <i class="bi bi-person me-1"></i> <span th:text="${turma.professor}">Docente Responsável</span>
            </p>
        </div>

        <div>
            <div class="d-flex align-items-center justify-content-between bg-light p-2 rounded mb-3">
                <span class="small text-secondary"><i class="bi bi-clock me-1"></i> Horário</span>
                <span class="small fw-bold text-dark" th:text="${turma.horario}">24M12</span>
            </div>
            
            <button class="btn btn-outline-primary btn-sm w-100 rounded-pill fw-bold">
                <i class="bi bi-plus-circle me-1"></i> Adicionar Interesse
            </button>
        </div>
    </div>
</div>
