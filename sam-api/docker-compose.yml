services:

  mysql:
    image: mysql:8.0
    container_name: sam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sam_db
      MYSQL_USER: sam
      MYSQL_PASSWORD: sam123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sam-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/sam_db
      SPRING_DATASOURCE_USERNAME: sam
      SPRING_DATASOURCE_PASSWORD: sam123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      mysql:
        condition: service_healthy